name: Deploy Sites (GitHub Pages)

# Publishes all static apps to GitHub Pages as a combined site:
#   /                   → bluecoins/docs  (Finance Dashboard)
#   /project-tracker/  → project-tracker/docs
#
# Required one-time setting: repo → Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "bluecoins/docs/**"
      - "project-tracker/docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build combined site
        run: |
          mkdir -p site
          cp -r bluecoins/docs/. site/
          mkdir -p site/project-tracker
          cp -r project-tracker/docs/. site/project-tracker/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
